<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calendar2</title>
    <link rel="stylesheet" href="../css/calendar2.css" />
  </head>
  <body>
    <div class="calendar">
      <div class="header">
        <button id="prev">◀</button>
        <h1 id="title">달력</h1>
        <button id="next">▶</button>
      </div>
      <div class="weekdays">
        <span>일</span>
        <span>월</span>
        <span>화</span>
        <span>수</span>
        <span>목</span>
        <span>금</span>
        <span>토</span>
      </div>
      <div id="days" class="days"></div>
    </div>
    <script type="module" src="../js/calendar2.js"></script>
  </body>
</html>
