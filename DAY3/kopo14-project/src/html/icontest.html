<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>icontest</title>
    <link rel="stylesheet" href="../css/icontest.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="icon-btn-group">
      <button class="icon-btn icon-btn--small icon-btn--blue">
        <i class="fa-solid fa-house"></i>
        <span class="icon-btn__label">홈</span>
      </button>
      <button class="icon-btn icon-btn--medium icon-btn--green">
        <i class="fa-regular fa-envelope"></i>
        <span class="icon-btn__label">메일</span>
      </button>
      <button class="icon-btn icon-btn--large icon-btn--orange">
        <i class="fa-solid fa-heart"></i>
        <span class="icon-btn__label">좋아요</span>
      </button>
      <button class="icon-btn icon-btn--medium icon-btn--purple">
        <i class="fa-solid fa-star"></i>
        <span class="icon-btn__label">즐겨찾기</span>
      </button>
      <button class="icon-btn icon-btn--large icon-btn--red">
        <i class="fa-solid fa-bell"></i>
        <span class="icon-btn__label">알림</span>
      </button>
    </div>
  </body>
</html>
